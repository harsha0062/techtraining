services:
  - type: web
    name: license-management-backend
    runtime: java
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/license_management-0.0.1-SNAPSHOT.jar
    rootDir: backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
